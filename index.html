<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北美日报</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Serif+Display&family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">

<!-- ============================================================
  ⚙️  第一步：把下面两行替换成你自己的值
  SUPABASE_URL  → Supabase 项目页 Settings > API > Project URL
  SUPABASE_KEY  → Supabase 项目页 Settings > API > anon public key
============================================================ -->
<script>
  const SUPABASE_URL = 'https://schauwgqscboljjupyry.supabase.co';   // ← 改这里
  const SUPABASE_KEY = 'sb_publishable_YvF7sCi4om8JAfcDk45C7w_DAqnY8ps';            // ← 改这里
</script>

<style>
:root {
  --gold: #B8860B; --gold-l: #D4A843; --gold-d: #8B6508;
  --ink: #1A1510; --ink-soft: #6B5B45; --ink-muted: #9C8C78;
  --paper: #FAF6EF; --cream: #F2EAD8;
  --bg: #0F0D0A; --bg2: #1A1510; --bg3: #231E16;
  --border: rgba(184,134,11,0.2); --text: #F2EAD8; --text-soft: #9C8C78;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans SC',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(184,134,11,0.03) 39px,rgba(184,134,11,0.03) 40px);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:960px;margin:0 auto;padding:0 24px}

/* NAV */
.topnav{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid var(--border)}
.nav-brand{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--gold)}
.nav-count{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-soft);letter-spacing:.1em}

/* HERO */
.hero{padding:56px 0 44px;border-bottom:1px solid var(--border)}
.hero-eyebrow{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:14px}
.hero-title{font-family:'DM Serif Display',serif;font-size:clamp(40px,7vw,72px);color:var(--text);line-height:1.05;letter-spacing:-.02em;margin-bottom:16px}
.hero-sub{font-size:14px;color:var(--text-soft);line-height:1.8;max-width:500px;font-weight:300}

/* LATEST */
.sec-head{padding:28px 0 16px;display:flex;align-items:baseline;gap:12px}
.sec-head h2{font-family:'DM Serif Display',serif;font-size:20px;color:var(--text);font-weight:400}
.sec-rule{flex:1;height:1px;background:var(--border)}
.sec-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-soft);letter-spacing:.12em;text-transform:uppercase}

.latest-card{display:grid;grid-template-columns:1fr auto;gap:24px;align-items:start;padding:24px 0;border-bottom:1px solid var(--border);text-decoration:none;transition:opacity .2s}
.latest-card:hover{opacity:.82}
.lc-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.lc-title{font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;color:var(--text);line-height:1.4;margin-bottom:8px}
.lc-deck{font-size:13px;color:var(--text-soft);line-height:1.7;font-weight:300;max-width:560px}
.lc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.lc-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;color:var(--text-soft);border:1px solid var(--border);padding:2px 8px;border-radius:2px}
.lc-arrow{font-size:24px;color:var(--gold-l);opacity:.5;margin-top:2px;transition:opacity .2s,transform .2s}
.latest-card:hover .lc-arrow{opacity:1;transform:translateX(3px)}

/* ARCHIVE LIST */
.archive-item{display:grid;grid-template-columns:100px 1fr auto;gap:12px;align-items:start;padding:14px 0;border-bottom:1px dashed var(--border);text-decoration:none;transition:opacity .2s}
.archive-item:hover{opacity:.8}
.ai-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.06em}
.ai-title{font-family:'Noto Serif SC',serif;font-size:14px;font-weight:600;color:var(--text);line-height:1.4}
.ai-deck{font-size:12px;color:var(--text-soft);margin-top:2px;font-weight:300;line-height:1.5}
.ai-arrow{font-size:12px;color:var(--gold-l);opacity:.4;margin-top:3px}

/* STATE */
.loading{padding:40px 0;text-align:center;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--text-soft)}
.loading::after{content:'';animation:dots 1.2s infinite}
@keyframes dots{0%{content:''}33%{content:'.'}66%{content:'..'}100%{content:'...'}}
.empty{padding:60px 0;text-align:center;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.12em;color:var(--text-soft)}
.error{padding:20px;background:rgba(193,68,14,0.1);border:1px solid rgba(193,68,14,0.3);border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;color:#E06840;margin:20px 0}

/* FOOTER */
.site-footer{padding:24px 0;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;margin-top:20px}
.sf-brand{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.12em;text-transform:uppercase}
.sf-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-soft);letter-spacing:.08em}
</style>
</head>
<body>
<div class="wrap">

  <nav class="topnav">
    <div class="nav-brand" id="site-brand">北美日报</div>
    <div class="nav-count" id="issue-count">加载中…</div>
  </nav>

  <section class="hero">
    <div class="hero-eyebrow">Daily Intelligence · North America</div>
    <h1 class="hero-title" id="hero-title">北美日报</h1>
    <p class="hero-sub">每日北美游戏 · 时事 · 美食 · 文化，四个栏目，高密度信号简报。</p>
  </section>

  <!-- LATEST -->
  <div class="sec-head">
    <h2>最新一期</h2>
    <div class="sec-rule"></div>
    <span class="sec-label">Latest</span>
  </div>
  <div id="latest-slot"><div class="loading">正在加载</div></div>

  <!-- ARCHIVE -->
  <div class="sec-head" style="margin-top:12px;">
    <h2>往期存档</h2>
    <div class="sec-rule"></div>
    <span class="sec-label">Archive</span>
  </div>
  <div id="archive-slot"><div class="loading">正在加载</div></div>

  <footer class="site-footer">
    <div class="sf-brand" id="footer-brand">北美日报</div>
    <div class="sf-meta">Powered by Supabase + GitHub Pages</div>
  </footer>

</div>

<script>
// ── Fetch all briefs from Supabase ──
async function loadBriefs() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/briefs?select=date,title,lead,deck,s1_name,s2_name,s3_name,s4_name&order=date.desc`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    render(data);
  } catch(err) {
    document.getElementById('latest-slot').innerHTML =
      `<div class="error">⚠️ 加载失败：${err.message}<br>请检查 SUPABASE_URL 和 SUPABASE_KEY 是否填写正确。</div>`;
    document.getElementById('archive-slot').innerHTML = '';
  }
}

function fmtDate(d) {
  // d = "2026-06-09"
  const [y,m,day] = d.split('-');
  const wds = ['日','一','二','三','四','五','六'];
  const wd = wds[new Date(d+'T12:00:00').getDay()];
  return { mmdd: `${m}/${day}`, full: `${y}年${m}月${day}日`, wd: `星期${wd}` };
}

function briefUrl(date) {
  return `brief.html?date=${date}`;
}

function render(data) {
  const siteTitle = (data[0]?.title) || '北美日报';
  document.getElementById('site-brand').textContent = siteTitle;
  document.getElementById('hero-title').textContent = siteTitle;
  document.getElementById('footer-brand').textContent = siteTitle;
  document.getElementById('issue-count').textContent =
    data.length ? `共 ${data.length} 期` : '暂无内容';

  if (!data.length) {
    document.getElementById('latest-slot').innerHTML = '<div class="empty">暂无内容，发布第一期后自动显示</div>';
    document.getElementById('archive-slot').innerHTML = '';
    return;
  }

  // Latest card
  const latest = data[0];
  const ld = fmtDate(latest.date);
  const tags = [latest.s1_name,latest.s2_name,latest.s3_name,latest.s4_name].filter(Boolean);
  document.getElementById('latest-slot').innerHTML = `
    <a href="${briefUrl(latest.date)}" class="latest-card">
      <div>
        <div class="lc-date">${ld.mmdd} · ${ld.wd} · ${ld.full}</div>
        <div class="lc-title">${latest.lead || latest.title || siteTitle}</div>
        <div class="lc-deck">${latest.deck || ''}</div>
        <div class="lc-tags">${tags.map(t=>`<span class="lc-tag">${t}</span>`).join('')}</div>
      </div>
      <div class="lc-arrow">→</div>
    </a>`;

  // Archive (skip first)
  const rest = data.slice(1);
  if (!rest.length) {
    document.getElementById('archive-slot').innerHTML = '<div class="empty" style="padding:20px 0;font-size:10px;">更多期数发布后显示在这里</div>';
    return;
  }
  document.getElementById('archive-slot').innerHTML = rest.map(b => {
    const bd = fmtDate(b.date);
    return `<a href="${briefUrl(b.date)}" class="archive-item">
      <span class="ai-date">${bd.mmdd} · ${bd.wd}</span>
      <div><div class="ai-title">${b.lead || b.title || siteTitle}</div>
        <div class="ai-deck">${b.deck || ''}</div></div>
      <span class="ai-arrow">→</span>
    </a>`;
  }).join('');
}

loadBriefs();
</script>
</body>
</html>
