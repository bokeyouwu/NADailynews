<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>北美日报</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Serif+Display&family=Noto+Serif+SC:wght@400;600;700&family=DM+Mono:wght@400;500&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">

<!-- ⚙️ 和 index.html 填一样的值 -->
<script>
  const SUPABASE_URL = 'https://schauwgqscboljjupyry.supabase.co';   // ← 改这里
  const SUPABASE_KEY = 'sb_publishable_YvF7sCi4om8JAfcDk45C7w_DAqnY8ps';            // ← 改这里
</script>

<style>
:root{
  --primary:#B8860B;--primary-light:#D4A843;--primary-dark:#8B6508;
  --ink:#1A1510;--ink-mid:#3D3020;--ink-soft:#6B5B45;--ink-muted:#9C8C78;
  --paper:#FAF6EF;--paper-warm:#F2EAD8;--rule:rgba(184,134,11,0.14);--rule-strong:rgba(184,134,11,0.32);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans SC',sans-serif;min-height:100vh;position:relative}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 27px,rgba(184,134,11,0.025) 27px,rgba(184,134,11,0.025) 28px),repeating-linear-gradient(90deg,transparent,transparent 27px,rgba(184,134,11,0.015) 27px,rgba(184,134,11,0.015) 28px);pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:1360px;margin:0 auto;padding:0 28px}
.masthead{border-bottom:3px double var(--primary);padding:18px 0 14px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:12px}
.mh-left{display:flex;flex-direction:column;gap:2px}
.mh-kicker{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-muted)}
.mh-date{font-family:'Playfair Display',serif;font-size:30px;font-weight:900;color:var(--primary);line-height:1;letter-spacing:-.02em}
.mh-day{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink-soft);letter-spacing:.15em;text-transform:uppercase}
.mh-center{text-align:center}
.mh-title{font-family:'DM Serif Display',serif;font-size:clamp(18px,3vw,34px);color:var(--ink);line-height:1.15;letter-spacing:-.01em}
.mh-title em{color:var(--primary);font-style:normal}
.mh-sub{font-family:'DM Mono',monospace;font-size:8.5px;color:var(--ink-muted);letter-spacing:.16em;text-transform:uppercase;margin-top:3px}
.mh-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}
.nav-back{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-soft);text-decoration:none;letter-spacing:.07em;transition:color .2s}
.nav-back:hover{color:var(--primary)}
.hero{padding:26px 0 18px;border-bottom:1px solid var(--rule);display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:start}
.hero-bar{writing-mode:vertical-rl;font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--primary);border-left:2px solid var(--primary);padding-left:7px;height:64px;display:flex;align-items:center}
.hero-inner{display:flex;flex-direction:column;gap:5px}
.hero-kicker{font-family:'DM Mono',monospace;font-size:9.5px;color:var(--primary);letter-spacing:.14em;text-transform:uppercase}
.hero-hed{font-family:'Noto Serif SC',serif;font-size:clamp(20px,3vw,36px);font-weight:700;color:var(--ink);line-height:1.3;letter-spacing:-.02em}
.hero-deck{font-size:13.5px;color:var(--ink-soft);line-height:1.75;font-weight:300;max-width:800px;margin-top:2px}
.sections{display:grid;grid-template-columns:1fr 1fr;gap:0;margin:0 -28px;padding:0 28px}
.sec{padding:22px 18px 26px;border-right:1px solid var(--rule);border-bottom:1px solid var(--rule);position:relative}
.sec:nth-child(2){border-right:none}.sec:nth-child(3){border-bottom:none}.sec:nth-child(4){border-right:none;border-bottom:none}
.sec-head{display:flex;align-items:baseline;gap:9px;margin-bottom:16px;padding-bottom:9px;border-bottom:2px solid var(--primary)}
.sec-num{font-family:'Playfair Display',serif;font-size:28px;font-weight:900;color:rgba(184,134,11,0.15);line-height:1;letter-spacing:-.03em;position:relative;top:1px}
.sec-meta{display:flex;flex-direction:column;gap:1px}
.sec-title{font-family:'Noto Serif SC',serif;font-size:14.5px;font-weight:700;color:var(--ink);letter-spacing:.04em}
.sec-sub{font-family:'DM Mono',monospace;font-size:8.5px;color:var(--ink-muted);letter-spacing:.1em}
.sec-icon{margin-left:auto;font-size:19px;opacity:.55}
.item{padding:11px 0;border-bottom:1px dashed rgba(184,134,11,0.12);display:grid;grid-template-columns:18px 1fr;gap:9px;align-items:start}
.item:last-child{border-bottom:none;padding-bottom:0}
.item-mark{font-family:'DM Mono',monospace;font-size:13px;color:var(--primary-light);line-height:1.5;font-weight:500}
.item-body{display:flex;flex-direction:column;gap:3px}
.item-brand-line{display:flex;align-items:baseline;gap:5px;flex-wrap:wrap}
.item-brand{font-family:'Noto Serif SC',serif;font-size:12.5px;font-weight:700;color:var(--ink);letter-spacing:.02em}
.item-div{font-size:10px;color:var(--primary-light);opacity:.7}
.item-action{font-family:'Noto Serif SC',serif;font-size:11.5px;font-weight:600;color:var(--primary-dark);letter-spacing:.01em}
.item-text{font-size:12px;color:var(--ink-mid);line-height:1.8;font-weight:300}
.item-img{width:100%;border-radius:4px;margin:6px 0 3px;display:block;object-fit:cover;border:1px solid var(--rule);max-height:220px}
.item-src{display:flex;align-items:center;gap:5px;margin-top:1px}
.item-src a{font-family:'DM Mono',monospace;font-size:9px;color:var(--primary);text-decoration:none;border-bottom:1px solid var(--rule-strong);padding-bottom:1px;letter-spacing:.04em}
.item-src-date{font-family:'DM Mono',monospace;font-size:8.5px;color:var(--ink-muted)}
.insight{margin:0 -28px;padding:22px 56px;background:var(--ink);border-top:3px solid var(--primary);display:grid;grid-template-columns:auto 1fr;gap:22px;align-items:start}
.ins-label{font-family:'DM Mono',monospace;font-size:8.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--primary-light);writing-mode:vertical-rl;padding-right:10px;border-right:1px solid rgba(184,134,11,0.3)}
.ins-kicker{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--primary);margin-bottom:8px}
.ins-text{font-family:'Noto Serif SC',serif;font-size:15px;font-weight:600;color:var(--paper-warm);line-height:1.9;letter-spacing:.01em}
.footer{padding:15px 0;border-top:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center}
.footer-brand{font-family:'DM Mono',monospace;font-size:10px;color:var(--ink-muted);letter-spacing:.1em;text-transform:uppercase}
.footer-brand strong{color:var(--primary);font-weight:500}
.footer-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--ink-muted);letter-spacing:.08em}
/* states */
.loading-state,.error-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:16px;text-align:center;padding:40px}
.loading-spin{width:32px;height:32px;border:2px solid rgba(184,134,11,0.2);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.state-text{font-family:'DM Mono',monospace;font-size:11px;color:var(--ink-muted);letter-spacing:.12em}
.error-box{background:rgba(193,68,14,0.08);border:1px solid rgba(193,68,14,0.3);border-radius:4px;padding:20px 28px;font-family:'DM Mono',monospace;font-size:11px;color:#C1440E;line-height:1.8;max-width:480px}
@media(max-width:768px){.sections{grid-template-columns:1fr}.sec:nth-child(2){border-right:none;border-bottom:1px solid var(--rule)}.sec:nth-child(3){border-bottom:1px solid var(--rule)}.masthead{grid-template-columns:1fr;text-align:center}.mh-right{align-items:center}.hero{grid-template-columns:1fr}.hero-bar{writing-mode:horizontal-tb;height:auto;border-left:none;border-bottom:2px solid var(--primary);padding:0 0 5px}.insight{padding:20px 20px;grid-template-columns:1fr}.ins-label{writing-mode:horizontal-tb;padding-right:0;border-right:none;padding-bottom:6px;margin-bottom:6px}}
</style>
</head>
<body>
<div class="wrap" id="app">
  <div class="loading-state">
    <div class="loading-spin"></div>
    <div class="state-text">加载中…</div>
  </div>
</div>

<script>
// ── Parse ?date= from URL ──
const urlDate = new URL(location.href).searchParams.get('date');

// ── Helpers ──
function e(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function getWeekday(d){
  const zh=['日','一','二','三','四','五','六'];
  const en=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const day=new Date(d+'T12:00:00').getDay();
  return{zh:`星期${zh[day]}`,en:en[day]};
}
function getDayColor(d){
  const palette=[
    {c:'#9B4D96',cl:'#C178BC'},{c:'#B8860B',cl:'#D4A843'},{c:'#C1440E',cl:'#E06840'},
    {c:'#4A7C59',cl:'#72A882'},{c:'#7B5EA7',cl:'#9E82C8'},{c:'#1A6B9A',cl:'#3891C4'},{c:'#9B4D96',cl:'#C178BC'}
  ];
  return palette[new Date(d+'T12:00:00').getDay()];
}

// ── Render a section ──
const MARKS = ['◆','◇','◈'];
const ICONS = ['🎰','🗞','🍔','🌆'];
const SUBS = ['博彩内容商 · 新游上线 · 玩法 · 视觉','美国时事 · 特朗普 · 国际 · 科技','北美餐饮趋势 · 地方美食 · 食物文化','人文 · 建筑 · 城市 · 节日 · 生活方式'];

function renderSection(num, icon, title, sub, items, color) {
  const active = (items||[]).filter(it => it.brand || it.body);
  const itemsHtml = active.map((it,i) => {
    const parts = (it.brand||'').split('|');
    const brand = parts[0]?.trim()||'';
    const action = parts[1]?.trim()||'';
    const imgHtml = it.image
      ? `<img src="${e(it.image)}" class="item-img" alt="${e(brand)}" loading="lazy">`
      : '';
    const srcHtml = (it.url||it.src) ? `<div class="item-src">
        ${it.url?`<a href="${e(it.url)}" target="_blank">→ ${e(it.url.replace(/^https?:\/\//,'').split('/')[0])}</a>`:''}
        ${it.src?`<span class="item-src-date">${e(it.src)}</span>`:''}
      </div>` : '';
    return `<div class="item">
      <span class="item-mark">${MARKS[i]||'◈'}</span>
      <div class="item-body">
        <div class="item-brand-line">
          ${brand?`<span class="item-brand">${e(brand)}</span>`:''}
          ${action?`<span class="item-div">|</span><span class="item-action">${e(action)}</span>`:''}
        </div>
        ${imgHtml}
        ${it.body?`<p class="item-text">${e(it.body).replace(/\n/g,'<br>')}</p>`:''}
        ${srcHtml}
      </div>
    </div>`;
  }).join('');

  return `<div class="sec">
    <div class="sec-head">
      <span class="sec-num">${num}</span>
      <div class="sec-meta">
        <span class="sec-title">${e(title)}</span>
        <span class="sec-sub">${e(sub)}</span>
      </div>
      <span class="sec-icon">${icon}</span>
    </div>
    ${itemsHtml || '<div style="font-family:\'DM Mono\',monospace;font-size:9px;color:var(--ink-muted);padding:12px 0;">暂无内容</div>'}
  </div>`;
}

// ── Main render ──
function renderBrief(b) {
  const date = b.date;
  const {zh:wdZh,en:wdEn} = getWeekday(date);
  const {c:primary,cl:primaryLight} = getDayColor(date);
  const mmdd = date.slice(5).replace('-','/');
  const title = b.title || '北美日报';
  const sections = b.sections || {};
  const s1=b.s1_name||'北美游戏', s2=b.s2_name||'北美时事', s3=b.s3_name||'北美美食', s4=b.s4_name||'北美文化';

  // Apply primary color dynamically
  document.documentElement.style.setProperty('--primary', primary);
  document.documentElement.style.setProperty('--primary-light', primaryLight);
  document.documentElement.style.setProperty('--primary-dark', primary + 'cc');
  document.title = `${title} · ${mmdd}`;

  const insightHtml = b.insight ? `<div class="insight">
    <div class="ins-label">Today's Insight</div>
    <div>
      <div class="ins-kicker">跨栏目洞察 · Cross-Column Signal</div>
      <p class="ins-text">${e(b.insight).replace(/\n/g,'<br>')}</p>
    </div>
  </div>` : '';

  document.getElementById('app').innerHTML = `
    <header class="masthead">
      <div class="mh-left">
        <span class="mh-kicker">North America Daily</span>
        <span class="mh-date">${mmdd}</span>
        <span class="mh-day">${wdEn} · ${wdZh}</span>
      </div>
      <div class="mh-center">
        <h1 class="mh-title">${e(title)}</h1>
        <div class="mh-sub">${e(s1)} · ${e(s2)} · ${e(s3)} · ${e(s4)}</div>
      </div>
      <div class="mh-right">
        <a href="index.html" class="nav-back">← 返回首页</a>
      </div>
    </header>

    <div class="hero">
      <div class="hero-bar">TODAY'S SIGNAL</div>
      <div class="hero-inner">
        <div class="hero-kicker">今日导语 · ${date}</div>
        <h2 class="hero-hed">${e(b.lead||title)}</h2>
        ${b.deck?`<p class="hero-deck">${e(b.deck).replace(/\n/g,'<br>')}</p>`:''}
      </div>
    </div>

    <div class="sections">
      ${renderSection('01',ICONS[0],s1,SUBS[0],sections.games,primary)}
      ${renderSection('02',ICONS[1],s2,SUBS[1],sections.news,primary)}
      ${renderSection('03',ICONS[2],s3,SUBS[2],sections.food,primary)}
      ${renderSection('04',ICONS[3],s4,SUBS[3],sections.culture,primary)}
    </div>

    ${insightHtml}

    <footer class="footer">
      <div class="footer-brand"><strong>${e(title)}</strong> · ${e(s1)} · ${e(s2)} · ${e(s3)} · ${e(s4)}</div>
      <div class="footer-meta">${date} · ${wdZh}</div>
    </footer>`;
}

// ── Load from Supabase ──
async function load() {
  if (!urlDate) {
    document.getElementById('app').innerHTML = `<div class="error-state"><div class="error-box">⚠️ 缺少 date 参数<br>链接格式应为：brief.html?date=2026-06-09</div></div>`;
    return;
  }
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/briefs?date=eq.${urlDate}&select=*&limit=1`,
      { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` } }
    );
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data.length) {
      document.getElementById('app').innerHTML = `<div class="error-state"><div class="error-box">找不到 ${urlDate} 的数据<br>请确认该期已发布</div></div>`;
      return;
    }
    renderBrief(data[0]);
  } catch(err) {
    document.getElementById('app').innerHTML = `<div class="error-state"><div class="error-box">⚠️ 加载失败：${err.message}<br>请检查 Supabase 配置</div></div>`;
  }
}

load();
</script>
</body>
</html>
